<!DOCTYPE html>
<html>
<head>
  <title>Student Login Portal</title>
  <style>
    body {
      font-family: Arial;
      background-color: #e8f5e9;
      text-align: center;
      margin-top: 80px;
    }
    .login-box {
      background: white;
      padding: 20px;
      width: 300px;
      margin: auto;
      border-radius: 10px;
      box-shadow: 0px 0px 10px gray;
    }
    h1 {
      color: #2e7d32;
      font-size: 20px;
      margin-bottom: 5px;
    }
    h2 {
      color: #388e3c;
      font-size: 16px;
      margin-top: 0;
    }
    input {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
      border: 1px solid #a5d6a7;
      border-radius: 5px;
    }
    button {
      padding: 10px;
      width: 95%;
      background-color: #2e7d32;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 5px;
      font-size: 16px;
    }
    button:hover {
      background-color: #1b5e20;
    }
    button:disabled {
      background-color: gray;
      cursor: not-allowed;
    }
    #message {
      margin-top: 10px;
      font-weight: bold;
      font-size: 15px;
    }
    #attempts {
      margin-top: 5px;
      font-size: 13px;
      color: #888;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h1>🎓 Student Login Portal</h1>
    <h2>Welcome! Please log in.</h2>

    <input type="text" id="username" placeholder="Enter Username">
    <input type="password" id="password" placeholder="Enter Password">
    <button onclick="login()" id="loginBtn">Login</button>

    <p id="message"></p>
    <p id="attempts"></p>
  </div>

  <script>
    // TASK 2: 3 Users
    var users = [
      { username: "Lawrence", password: "2004" },
      { username: "student1", password: "1111" },
      { username: "student2", password: "2222" }
    ];

    // TASK 3: Attempts limit
    var attempts = 0;
    var maxAttempts = 3;

    function login() {
      // Check if locked
      if (attempts >= maxAttempts) {
        document.getElementById("message").innerHTML = "🔒 Account Locked!";
        document.getElementById("message").style.color = "red";
        return;
      }

      var user = document.getElementById("username").value;
      var pass = document.getElementById("password").value;

      // Check against all users
      var found = false;
      for (var i = 0; i < users.length; i++) {
        if (user == users[i].username && pass == users[i].password) {
          found = true;
          break;
        }
      }

      if (found) {
        // TASK 5: Welcome message with username
        document.getElementById("message").innerHTML = "✅ Welcome, " + user + "!";
        document.getElementById("message").style.color = "green";
        document.getElementById("attempts").innerHTML = "";
        document.getElementById("loginBtn").disabled = true;
      } else {
        attempts++;
        var remaining = maxAttempts - attempts;

        if (attempts >= maxAttempts) {
          // TASK 3: Lock account
          document.getElementById("message").innerHTML = "🔒 Account Locked!";
          document.getElementById("message").style.color = "red";
          document.getElementById("attempts").innerHTML = "No more attempts allowed.";
          document.getElementById("loginBtn").disabled = true;
        } else {
          document.getElementById("message").innerHTML = "❌ Invalid Username or Password!";
          document.getElementById("message").style.color = "red";
          document.getElementById("attempts").innerHTML = "Attempts remaining: " + remaining;
        }
      }
    }
  </script>
</body>
</html>
